server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tamanho máximo do corpo (importação de textos extensos de normas)
    client_max_body_size 12m;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Proxy da API → backend (rede interna do Compose)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # Arquivos estáticos com cache longo
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA Angular: todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
